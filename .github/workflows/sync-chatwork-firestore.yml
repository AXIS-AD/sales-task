name: Sync Chatwork Tasks

on:
  schedule:
    # JST 09:00 / 19:00
    - cron: "0 0,10 * * *"
  workflow_dispatch:

concurrency:
  group: sync-chatwork-firestore
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Sync Chatwork to Firestore
        run: npm run sync:chatwork-firestore
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIRESTORE_APP_PATH: salesTaskApps/abcClinic
